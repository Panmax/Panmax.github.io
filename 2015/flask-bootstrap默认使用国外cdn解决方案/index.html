</header>

    
    
      <p><code>flask-bootstrap</code> 默认走的是国外CDN，所以在天朝使用起来速度奇慢。</p>
<p>解决办法:</p>
<ul>
<li>找到在包管理目录中找到<code>flask-bootstrap</code>的<code>__init__.py</code>文件，将里边控制CDN部分的代码修改为：</li>
</ul>
<figure class="highlight lisp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line">bootstrap = lwrap(</span><br><span class="line">    WebCDN('//cdn.bootcss.com/bootstrap/%s/'</span><br><span class="line">           % BOOTSTRAP_VERSION),</span><br><span class="line">    local)</span><br><span class="line"></span><br><span class="line">jquery = lwrap(</span><br><span class="line">    WebCDN('//cdn.bootcss.com/jquery/%s/'</span><br><span class="line">           % JQUERY_VERSION),</span><br><span class="line">    local)</span><br></pre></td></tr></table></figure>
<p>只修改这两段即可。</p>
<ul>
<li>直接用我fork的分支进行安装<code>flask-bootstrap</code>，源码我已修改为使用国内CDN：</li>
</ul>
<figure class="highlight awk"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">pip install git+https:<span class="regexp">//gi</span>thub.com<span class="regexp">/Panmax/</span>flask-bootstrap.git</span><br></pre></td></tr></table></figure>
<p>或</p>
<figure class="highlight awk"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">git+https:<span class="regexp">//gi</span>thub.com<span class="regexp">/Panmax/</span>flask-bootstrap.git</span><br></pre></td></tr></table></figure>
<p>将此写在<code>requirements.txt</code>文件中</p>
