	<h1 class="post-title" itemprop="name headline">随机从一个数组中取出n个元素打乱顺序构成新的数组</h1>



</header>

    
    
      <p>今天要求实现一个功能是从被推荐的用户中，随机取出n个用户，并打乱顺序返回。</p>
<p>看了看random模块刚好有这种功能的实现，所以就直接拿来用了。</p>
<p>所有被推荐用户的列表为:<code>recommend_users</code>，已经确定的是，这个列表的长度一定大于n。</p>
<p>我们需要将结果保存在<code>recommend_user_list</code>中。</p>
<p>首先，从这个列表中随机取出n个元素：</p>
<figure class="highlight arduino"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> <span class="built_in">random</span></span><br><span class="line">recommend_user_list = <span class="built_in">random</span>.sample(recommend_users, n)</span><br></pre></td></tr></table></figure>
<p>这个方法是从<code>recommend_users</code>列表中按顺序随机取出n个元素，因为我们需要打乱顺序，所以还需要调用另一个方法。</p>
<figure class="highlight autoit"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta"># 将这个数组打乱顺序</span></span><br><span class="line"><span class="built_in">random</span>.shuffle(recommend_user_list)</span><br></pre></td></tr></table></figure>
<p>搞定！~</p>
