# 工作经历

## 北京魔镜最美网络科技有限公司 （ 2015年11月 ~ 今）

### 职位： 后端负责人

### 魔镜APP 1.0 （不是那个做VR的魔镜）

这个 APP 有个功能和 探探 非常类似，提供其他用户上传的照片展示给用户来做评价，上滑喜欢、下滑无感，评价过的照片不会再次出现，这个功能在发布后发现了不少问题，比如用户评价1次，可能因为网络等其他导致并发的原因记录两条数据，后来我采取的方案是用 Redis 的 Pub/Sub 模式，用户在投票后，主服务器发出通知交给另一台服务器处理任务，最终解决了这个问题。

还有个问题是如何让用户看到过的照片不再出现在评分界面，解决这个问题的办法是给每个用户在 Redis 中生成一个缓存队列，记录每个用户还没看过的照片，用户每看一张照片，就从队列里移除一个元素，有新照片产生时，往队列增加一个元素，同时控制队列的长度和过期时间。详细优化细节见Blog: [记一次业务逻辑优化](http://panmax.love/2015/%E8%AE%B0%E4%B8%80%E6%AC%A1%E4%B8%9A%E5%8A%A1%E9%80%BB%E8%BE%91%E4%BC%98%E5%8C%96/)

### 魔镜APP 1.3

这个版本最重要的功能是用户动态，类似与 Ins 里的动态，可以看关注用户新发的照片、给哪些照片点过赞等等。实现方式是每个用户有动作发生是会记录一条 Feed数据 存在数据库中，同时通知任务服务器执行新增Feed的任务，离线服务器需要将关注他的人查找出来，然后给这些人的 Feed队列 新增数据， Feed 的队列使用的 Sorted Set 数据类型，采用时间戳作为 Key。通过编写这个模块，熟悉了 Feed 的主流实现方式（推、拉），和 Redis 中 Sorted Set 的使用。

> 魔镜APP 下载连接： [http://d.amojing.com/](http://d.amojing.com/)

## 北京医道互联科技有限公司 （ 2015年6月 ~ 11月 ）

### 职位： Python工程师

### 我爱好医生2.0

此项目有两个版本，分为医生版和患者版，我为这两个版本客户端提供接口，使用Flask作为Web框架，接口遵循RestfulApi规范，使用Celery为任务队列，使用阿里云的kvstore作为键值存储，本地测试时使用Redis。关系型数据库用的MySQL。 我在这个项目中熟悉了Restful规范，对接口开发有了新的认识。对接口安全性有了一定的了解，了解了token的机制。并且明白了如何与客户端如何配合进行工作、如何编写出让客户端小伙伴满意的接口。


### 好医生官网App

这个项目是为我们的母公司进行App开发同时将我们已有的部分功能融入进去，我在这个项目中的工作是为客户端提供接口还有与母公司数据进行打通，在这个项目中我们遇到最大的问题就是账户同步问题，因为母公司的账户体系比较复杂，并且下边站点也很多，而且母公司给我们提供的支持也不够，在这个项目中我们想让用户可以用母公司的帐号登录App后同时可以使用我们自己的已有功能，经过讨论后，最终采用了我提出的策略：每次用户在登录时，服务器通过母公司提供的接口，将用户资料拉取过来，如果我们库中不存在该帐号则进行新建，如果存在则将我们库中的资料进行更新，这样可以解决的问题是用户在母公司网页上更新资料后，我们这可以得到最新的资料。如果用户使用我们的App修改资料的话，我们会修改我们库中的资料，并且调用母公司的修改接口进行资料修改。最终顺利完成了账户体系的对接工作。



### 我爱好医生3.0

这个项目中我担任后端负责人，在这个项目中我们要实现一个医生为患者填写病历的功能，并且能够为每种疾病生成出不同的病历表单方便医生填写，为此我编写了一套问诊表单动态生成、存储、填写、渲染结果的系统，为此次版本做出了很大的贡献，并且采用了一点git的思想，将每次医生的填写结果生成新的head，每个病历的信息都指向最新的head，这样可以方便历史记录的保存和今后也许会用到的回滚历史的功能。这个系统我部署在现在很流行的LeanCloud上，并且已开源在GitHub。

## 河北小林网络科技有限公司 （ 2014年12月 \~ 2015年6月 ）

### 职位： 客户端实习

### 乐搜搜（现改名为：来客搜搜）

使用 Hybird App 技术进行App开发，采用 Ionic 前端框架，采用PhoneGap为中间件和手机进行硬件交互，编写多平台App，我在这个项目中担任客户端开发人员，在这个项目中掌握了 AngualrJS 的使用。
