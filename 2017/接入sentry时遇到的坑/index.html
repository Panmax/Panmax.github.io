    <div class="post-body" itemprop="articleBody">

      
      

      
        <p>将 进销存SaaS 接入 <a href="https://sentry.io" target="_blank" rel="noopener">Sentry</a>，但是接入后发现无法通过 ajax 来 <code>POST</code> 或者 <code>PUT</code> 数据， 会报：</p>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">title</span>&gt;</span>400 Bad Request<span class="tag">&lt;/<span class="name">title</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">h1</span>&gt;</span>Bad Request<span class="tag">&lt;/<span class="name">h1</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">p</span>&gt;</span>Failed to decode JSON object: No JSON object could be decoded<span class="tag">&lt;/<span class="name">p</span>&gt;</span></span><br></pre></td></tr></table></figure>
<p>解决办法是在 js 的 ajax 方法中加上：<code>contentType:&quot;application/json; charset=utf-8&quot;,</code>。</p>
<p><strong>注：只需要在提交的数据类型为 <code>Json</code> 的 <code>POST</code> 或 <code>PUT</code> 的方法上添加就行了，不用在提交 <code>Form 表单</code> 的地方添加，否则加上后 <code>Form 表单</code> 类型的 ajax 就无法提交了。</strong></p>
