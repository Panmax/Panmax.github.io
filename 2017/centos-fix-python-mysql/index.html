        <p>今天在服务器上用 pip 安装 MySQL-python 时报错，虽然之前处理过很多次，但都没有记录，这次记录一下。</p>
<p>报错如下：</p>
<figure class="highlight sql"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div><div class="line">17</div><div class="line">18</div><div class="line">19</div><div class="line">20</div><div class="line">21</div><div class="line">22</div><div class="line">23</div><div class="line">24</div><div class="line">25</div><div class="line">26</div><div class="line">27</div><div class="line">28</div><div class="line">29</div><div class="line">30</div><div class="line">31</div><div class="line">32</div><div class="line">33</div></pre></td><td class="code"><pre><div class="line">Downloading/unpacking MySQL-python</div><div class="line">  Downloading MySQL-python-1.2.5.zip (108kB): 108kB downloaded</div><div class="line">  Running setup.py egg_info for package MySQL-python</div><div class="line">    sh: mysql_config: command not found</div><div class="line">    Traceback (most recent <span class="keyword">call</span> <span class="keyword">last</span>):</div><div class="line">      <span class="keyword">File</span> <span class="string">"&lt;string&gt;"</span>, line <span class="number">16</span>, <span class="keyword">in</span> &lt;<span class="keyword">module</span>&gt;</div><div class="line">      <span class="keyword">File</span> <span class="string">"/home/jiapan/.virtualenvs/appstore-crawler/build/MySQL-python/setup.py"</span>, line <span class="number">17</span>, <span class="keyword">in</span> &lt;<span class="keyword">module</span>&gt;</div><div class="line">        metadata, options = get_config()</div><div class="line">      <span class="keyword">File</span> <span class="string">"setup_posix.py"</span>, line <span class="number">43</span>, <span class="keyword">in</span> get_config</div><div class="line">        libs = mysql_config(<span class="string">"libs_r"</span>)</div><div class="line">      <span class="keyword">File</span> <span class="string">"setup_posix.py"</span>, line <span class="number">25</span>, <span class="keyword">in</span> mysql_config</div><div class="line">        <span class="keyword">raise</span> EnvironmentError(<span class="string">"%s not found"</span> % (mysql_config.path,))</div><div class="line">    EnvironmentError: mysql_config <span class="keyword">not</span> <span class="keyword">found</span></div><div class="line">    <span class="keyword">Complete</span> <span class="keyword">output</span> <span class="keyword">from</span> command python setup.py egg_info:</div><div class="line">    sh: mysql_config: command <span class="keyword">not</span> <span class="keyword">found</span></div><div class="line"></div><div class="line">Traceback (most recent <span class="keyword">call</span> <span class="keyword">last</span>):</div><div class="line"></div><div class="line">  <span class="keyword">File</span> <span class="string">"&lt;string&gt;"</span>, line <span class="number">16</span>, <span class="keyword">in</span> &lt;<span class="keyword">module</span>&gt;</div><div class="line"></div><div class="line">  <span class="keyword">File</span> <span class="string">"/home/jiapan/.virtualenvs/appstore-crawler/build/MySQL-python/setup.py"</span>, line <span class="number">17</span>, <span class="keyword">in</span> &lt;<span class="keyword">module</span>&gt;</div><div class="line"></div><div class="line">    metadata, options = get_config()</div><div class="line"></div><div class="line">  <span class="keyword">File</span> <span class="string">"setup_posix.py"</span>, line <span class="number">43</span>, <span class="keyword">in</span> get_config</div><div class="line"></div><div class="line">    libs = mysql_config(<span class="string">"libs_r"</span>)</div><div class="line"></div><div class="line">  <span class="keyword">File</span> <span class="string">"setup_posix.py"</span>, line <span class="number">25</span>, <span class="keyword">in</span> mysql_config</div><div class="line"></div><div class="line">    <span class="keyword">raise</span> EnvironmentError(<span class="string">"%s not found"</span> % (mysql_config.path,))</div><div class="line"></div><div class="line">EnvironmentError: mysql_config <span class="keyword">not</span> <span class="keyword">found</span></div></pre></td></tr></table></figure>
<p>解决方法：</p>
<p><code>sudo yum install python-devel mysql-devel</code></p>
